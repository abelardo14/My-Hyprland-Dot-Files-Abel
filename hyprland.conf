# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################



# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,1.33


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show run
$console = kitty


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
exec-once = waybar & hyprpaper & mako & awww-daemon & awww img /home/scaram/Pictures/wallpapers/nothing.jpg
exec-once = swayosd-server
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = systemctl --user start hyprpolkitagent
exec-once = libinput-gestures-setup start
exec-once = hyprpm reload -n
exec-once = hyprctl plugin load ~/.config/hypr/plugins/hypr-kinetic-scroll.so
exec-once = jamesdsp --tray
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = gnome-keyring-daemon --start --components=secrets

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user restart xdg-desktop-portal xdg-desktop-portal-hyprland

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,kvantum
env = STEAM_FORCE_DESKTOP_SCALING,1.0




###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 0

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(ff00007a) rgba(6100007a) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 13
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.7

    shadow {
        enabled = true
        range = 4
        render_power = 1
        color = rgba(000000CC)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 4
        passes = 3
        new_optimizations = true
        xray = true
        vibrancy = 0.1696
        ignore_opacity = true
        popups = true
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    bezier = appleDefault, 0.25, 0.1, 0.25, 1.0
    bezier = appleWorkspaces,  0.12, 0.3, 0.31, 1.00
    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = zoomFactor,    1,     7,     quick,

    animation = windows, 1, 4, appleDefault, popin 90%
    animation = windowsIn, 1, 4.5, appleDefault, slide
    animation = windowsOut, 1, 4.5, appleDefault, slide
    animation = fade, 1, 4, appleDefault

    # workspaces: плавное переключение столов
    animation = workspaces, 1, 4.5, appleWorkspaces, slidefade

    #animation = hyprfocusIn, 1, 3, appleWorkspaces
    #animation = hyprfocusOut, 1, 3, appleWorkspaces

}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#



# See https://wiki.hypr.land/Configuring/Master-Layout/ for more

####################################
###      ШРИФТ ВЕЗДЕСУЩИЙ        ###
####################################

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    font_family = "SF Compact rounded semibold 13h"
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        scroll_factor = 0.25
        disable_while_typing = false
    }


}

device {
    name = 2.4g-wireless-device-2
    sensitivity = -0.4
}

####################################
### ЖЕСТЫ И ВСЁ ТАКОЕ            ###
####################################
# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace
gesture = 3, vertical, dispatcher, hymission:toggle,forceall


# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Z, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, X, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = SUPER, SPACE, exec, pkill rofi || rofi -show drun -show-icons -font "sf compact rounded medium 13"
bind = SUPER, F, fullscreen
bind = SUPER SHIFT, S, hyprcapture:open


bind = $mainMod, L, exec, hyprlock
bind = SHIFT $mainMod, A, exec, waybar
bind = SUPER CTRL, C, exec, hyprpicker
bind = $mainMod, B, exec, ~/.config/hypr/scripts/toggle_hyprbars.sh

bind = $mainMod, C, exec, rofi -show calc -modi calc -no-show-match -no-sort
bind = CTRL ALT, delete, exec, rofi -show power-menu -modi power-menu:rofi-power-menu
bind = $mainMod, period, exec, rofi -show emoji

# Вместо hycov:toggleoverview попробуй:
# Вместо прямого вызова диспетчера, который еще "не проснулся":

bind = SUPER, TAB, hymission:toggle

bind = SUPER, V, exec, cliphist list | rofi -dmenu -p "📋Буфер обмена📋" -theme /usr/share/rofi/themes/android1234-clipboard.rasi | cliphist decode | wl-copy

# Перелистывание треков: Right Ctrl + PgDn (вперед) и PgUp (назад)
bind = Control_R, Next, exec, playerctl next
bind = Control_R, Prior, exec, playerctl previous
# Нажать на кнопку "Избранное" для паузы или воспроизведения
bind = , XF86Favorites, exec, playerctl play-pause

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && ~/.config/hypr/scripts/volume.sh && ~/.config/hypr/scripts/volume.sh
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && ~/.config/hypr/scripts/volume.sh && ~/.config/hypr/scripts/volume.sh
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && ~/.config/hypr/scripts/volume.sh ~/.config/hypr/scripts/volume.sh
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, ~/.local/bin/brightness.sh up
bindel = , XF86MonBrightnessDown, exec, ~/.local/bin/brightness.sh down

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
}

layerrule = blur on, match:namespace rofi
layerrule = dim_around on, match:namespace rofi
layerrule = animation popin, match:namespace rofi

layerrule = blur on, match:namespace wofi
layerrule = dim_around on, match:namespace wofi
layerrule = animation popin, match:namespace wofi
windowrule {
   name = blueberry
   match:float = true
}

windowrule {
  name = steam
  match:tag = --enable-features=UseOzonePlatform --ozone
}


windowrule {
  name = discord-transparency
  match:class = ^(discord)$

  # Параметр opacity принимает от 1 до 3 значений:
  # 1. Общая прозрачность
  # 2. Активное окно / Неактивное окно
  # 3. Активное / Неактивное / Полноэкранное
  opacity = 0.85 0.80
}

windowrule {
  name = telegram-style
  match:class = ^(org.telegram.desktop)$

  # Делаем его чуть менее прозрачным, чем Discord,
  # так как в Telegram много мелкого текста
  opacity = 0.85 0.6
}

layerrule = blur on, match:namespace wlogout



xwayland {
    force_zero_scaling = true
}


windowrule {
     name = no-gaps-f1
     match:float = false
     match:workspace = f[1]

     border_size = 0
     rounding = 0
 }




####################################
### ЗОНА ПЛАГИНОВ ТИПО КРУТО ЙОУ ###
####################################

plugin {
    hyprbars {
        bar_height = 20
        bar_color = rgb(303030)
        bar_text_size = 16
        bar_text_font = SF pro rounded
        bar_text_color = rgb(cdd6f4)
        bar_button_padding = 8
        bar_padding = 8
        bar_precedence_over_border = true

        buttons {
            button_size = 11ы
            col.maximize = rgb(a6e3a1)
            col.close = rgb(f38ba8)

            button {
            col = rgb(ff0000)
            action = exec, kitty
            }


        }
    }
}


plugin {
    hyprfocus {
        enabled = yes
        animate_floating = yes
        mode = slide
        slide_height = 5
        animate_workspacechange = yes
        mouse_focus_animation = yes
        focus_animation = flash    # Варианты: flash, shrink, bounce, none
        bezier = bezIn, 0.5,0.0,1.0,0.5
        bezier = bezOut, 0.0,0.5,0.5,1.0
        # Если захочешь эффект уменьшения/сжатия окна вместо вспышки:
        shrink {
        shrink_percentage = 0.1
        in_bezier = bezIn
        in_speed = 0.1

        out_bezier = bezOut
        out_speed = 1
        }
    }
}

plugin {
    hymission {
        outer_padding_top = 92
        outer_padding_right = 32
        outer_padding_bottom = 32
        outer_padding_left = 32
        row_spacing = 1
        column_spacing = 100
        min_window_length = 120
        min_preview_short_edge = 32
        small_window_boost = 1
        max_preview_scale = 1
        workspace_overview_max_preview_scale = 1.95
        min_slot_scale = 0.10
        natural_scale_flex = 200
        layout_engine = mission-control
        layout_scale_weight = 1.0
        layout_space_weight = 0.10

        expand_selected_window = 1
        overview_focus_follows_mouse = 1
        multi_workspace_sort_recent_first = 1
        niri_mode = 0
        niri_scroll_pixels_per_delta = 1.0
        niri_workspace_scale = 1.0
        toggle_switch_mode = 1
        switch_toggle_auto_next = 1
        switch_release_key = Super_L
        gesture_invert_vertical = 0
        one_workspace_per_row = 0
        only_active_workspace = 0
        only_active_monitor = 0
        show_special = 0
        workspace_change_keeps_overview = 1

        workspace_strip_anchor = left
        workspace_strip_empty_mode = existing
        workspace_strip_thickness = 160
        workspace_strip_gap = 24
        hide_bar_when_strip = 1
        hide_bar_animation = 1
        hide_bar_animation_blur = 1
        hide_bar_animation_move_multiplier = 0.8
        hide_bar_animation_scale_divisor = 3.1
        hide_bar_animation_alpha_end = 1
        bar_single_mission_control = 0
        show_focus_indicator = 0

        debug_logs = 0
        debug_surface_logs = 0

    }

}



plugin {
    hyprcapture {
        path = ~/Pictures/Screenshots
        clipboard = true
        sound = false
        delay = 0
    }
}


plugin {
    hypr-kinetic-scroll {
        # Коэффициент трения (чем меньше, тем дольше длится скролл по инерции)
        friction = 0.35
        # Чувствительность
        amplitude = 0.4
    }
}
