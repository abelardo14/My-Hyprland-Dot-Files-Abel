# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

$font = nothing font

general {
    hide_cursor = false
}

# uncomment to enable fingerprint authentication
 auth {
     fingerprint {
         enabled = true
         ready_message = Scan fingerprint to unlock
         present_message = Scanning...
         retry_delay = 250 # in milliseconds
     }
 }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 4, fadeIn
}

background {
    monitor =
    path = screenshot
    blur_passes = 5
    blur_size = 10
    vibrancy = 1
    color = rgba(0, 0, 0, 0.7)       # Черный цвет с 50% прозрачностью
    contrast = 0.8                   # Опционально: контраст
    brightness = 0.6                 # Затемнение фона
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

}

input-field {
    monitor =
    size = 6%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(9a0202c4) rgba(ffffffa0) 45deg
    check_color = rgba(62ff6cff) rgba(ffffff96) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = true
    rounding = 10

    font_family = $font
    placeholder_text = ㅤ
    fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format =
    dots_size = 0.25
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, 50
    halign = center
    valign = bottom
    shadow_passes = 3  # Включает тень (1-3 прохода), 0 - отключить
    shadow_size = 2      # Размер тени
    shadow_color = rgb(0,0,0) # Цвет тени
    shadow_boost = 0.5   # Увеличение непрозрачности (опционально)
}
}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 180
    font_family = SF compact Rounded black

    position = 0, -60
    halign = center
    valign = top
    shadow_passes = 3  # Включает тень (1-3 прохода), 0 - отключить
    shadow_size = 2      # Размер тени
    shadow_color = rgb(0,0,0) # Цвет тени
    shadow_boost = 0.5   # Увеличение непрозрачности (опционально)
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 30
    font_family = SF Pro Rounded bold
    position = 0, -340
    halign = center
    valign = top
    shadow_passes = 3  # Включает тень (1-3 прохода), 0 - отключить
    shadow_size = 2      # Размер тени
    shadow_color = rgb(0,0,0) # Цвет тени
    shadow_boost = 0.5   # Увеличение непрозрачности (опционально)
}
}

label {
    monitor =
    text = $LAYOUT[en,ru]
    font_size = 52
    onclick = hyprctl switchxkblayout all next
    font_family = SF Pro Rounded thin
    position = -20, 10
    halign = right
    valign = bottom
    shadow_passes = 3  # Включает тень (1-3 прохода), 0 - отключить
    shadow_size = 2      # Размер тени
    shadow_color = rgb(0,0,0) # Цвет тени
    shadow_boost = 0.5   # Увеличение непрозрачности (опционально)
}
}
